<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos · MERC-PD | Registrar Usuario</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    {% include 'mercpd_app/partials/sidebar.html' %}

    <div class="main-content" id="main-content">
    <div class="page">
        <div class="page-header">
            <h2>Registrar Nuevo Usuario</h2>
            <p>Acceso exclusivo para el rol Administrador. Define el nivel de acceso del nuevo usuario.</p>
        </div>

        <div class="container" style="max-width: 500px;">
            {% if error %}
                <div class="alert" style="background-color: var(--color-danger-bg); color: var(--color-danger); border-color: var(--color-danger);">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="alert" style="background-color: var(--color-success-bg); color: var(--color-success); border-color: var(--color-success);">{{ success }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Correo:</label>
                    <input type="text" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="rol">Rol:</label>
                    <select id="rol" name="rol" required>
                        <option value="Arquitecto de Seguridad">Arquitecto de Seguridad</option>
                        <option value="Custodio de Activo">Custodio de Activo</option>
                        <option value="Auditor">Auditor</option>
                        <option value="Administrador">Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña temporal:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" style="width:100%;">Crear Usuario</button>
            </form>
        </div>
    </div>
    </div>
</body>
</html>
