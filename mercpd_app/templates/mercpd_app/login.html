<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERC-PD | Iniciar Sesión</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="page" style="max-width: 420px; padding-top: 80px;">
        <div class="page-header" style="text-align:center;">
            <h2>Kushki · MERC-PD</h2>
            <p>Ingresa tus credenciales para acceder al sistema.</p>
        </div>

        <div class="container">
            {% if error %}
                <div class="alert" style="background-color: var(--color-danger-bg); color: var(--color-danger); border-color: var(--color-danger);">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" action="/login/{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Correo:</label>
                    <input type="text" id="email" name="email" required placeholder="usuario@kushkitest.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" style="width:100%;">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
